model: xgb
is_classification: false
# Optuna mode: use 'optuna_hints' instead of 'params' to seed the search.
# Optuna will explore around these values but is free to go beyond them.
optuna_hints:
  n_estimators: 200
  learning_rate: 0.05
  max_depth: 5
  colsample_bytree: 0.8
  reg_alpha: 0.01
  reg_lambda: 1.0
